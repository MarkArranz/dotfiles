# GENERAL
import = ["/home/mark/.config/alacritty/themes/themes/tokyo-night-storm.toml"]
shell = "/bin/zsh"
working_directory = "/home/mark"
live_config_reload = true
ipc_socket = true

[window]
opacity = 0.75
# blur = true               # (works on MacOS/KDE Wayland)
startup_mode = "Windowed"
# option_as_alt = "Both"  # (MacOS only)

[font]
normal = { family = "FiraCode Nerd Font" }
size = 11.25

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t_-"

[scrolling]
history = 10000
multiplier = 3

[cursor]
style = { shape = "Block", blinking = "Always" }
vi_mode_style = { blinking = "Off" }
unfocused_hollow = true

[[hints.enabled]]
command = "xdg-open" # On Linux/BSD
# command = "open" # On MacOS
# command = { program = "cmd", args = [ "/c", "start", "" ] } # On Windows
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
binding = { key = "U", mods = "Control|Shift" }
regex = """
(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|
https://|http://|news:|file:|git://|ssh:|ftp://)
[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+
"""
